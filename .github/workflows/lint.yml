name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt -l (fail on any unformatted file)
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "::error::these files are not gofmt-clean:"
            echo "$diff"
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...

  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # pandoc lets the LaTeX renderer tests actually run instead of
      # skipping silently. The sandbox + sanitizer regression tests
      # depend on it.
      - name: install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - run: go test ./...
